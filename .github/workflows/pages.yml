name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Send Telegram Notification
        if: always()
        run: |
          STATUS="❌ FAILED"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ SUCCESS"
          fi

          MESSAGE=$(cat <<EOF
          🚀 *Old_Portfolio Deploy Alert*

          *Project:* ${{ github.repository }}
          *Status:* $STATUS
          *Commit:* \`${{ github.sha }}\`
          *Branch:* \`${{ github.ref_name }}\`

          [View Portfolio](https://abhishek6827.github.io/Portfolio/)
          [View Build Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )

          PAYLOAD=$(jq -n --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" --arg text "$MESSAGE" --arg parse_mode "Markdown" '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BUILD_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"