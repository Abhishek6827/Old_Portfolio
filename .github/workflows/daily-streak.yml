name: Daily Streak Maintenance

on:
  schedule:
    # Run daily at 12:00 PM IST (6:30 AM UTC)
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintain-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update streak timestamp
        run: |
          echo "Last streak update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/streak.txt

      - name: Commit and push
        run: |
          git config user.name "Abhishek6827"
          git config user.email "devilizbusy@gmail.com"
          git add .github/streak.txt
          git diff --staged --quiet || git commit -m "chore: maintain daily streak"
          git push origin main
